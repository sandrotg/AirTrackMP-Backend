spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/airtrackmp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: airtrack-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  # SSL directo en Spring (opcional): SSL_ENABLED=true + SSL_KEY_STORE + SSL_KEY_STORE_PASSWORD
  ssl:
    enabled: ${SSL_ENABLED:false}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*,https://*.vercel.app}

jwt:
  secret: airtrackmpsecretkeyairtrackmpsecretkey123456

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}

logging:
  level:
    org.springframework.security: DEBUG
    com.airtrackmp.iot.airtrackmp.service.producers: INFO
    com.airtrackmp.iot.airtrackmp.service.consumers: INFO
