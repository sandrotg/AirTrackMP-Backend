services:

  db:
    image: postgres:15
    container_name: airtrackmp_db
    restart: always
    environment:
      POSTGRES_DB: airtrackmp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ml-service:
    build: ./ml-service
    container_name: airtrackmp_ml
    restart: always
    ports:
      - "5000:5000"

  api:
    build: .
    container_name: airtrackmp_api
    restart: always
    depends_on:
      - db
      - ml-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/airtrackmp
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      ML_SERVICE_URL: http://ml-service:5000

volumes:
  postgres_data:
