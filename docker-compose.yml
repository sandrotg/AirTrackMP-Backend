services:

  db:
    image: postgres:15
    container_name: airtrackmp_db
    restart: always
    environment:
      POSTGRES_DB: airtrackmp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.9.0
    container_name: airtrackmp_kafka
    restart: always
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  ml-service:
    build: ./ml-service
    container_name: airtrackmp_ml
    restart: always
    ports:
      - "5000:5000"

  api:
    build: .
    container_name: airtrackmp_api
    restart: always
    depends_on:
      - db
      - kafka
      - ml-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/airtrackmp
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      ML_SERVICE_URL: http://ml-service:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  postgres_data:
