services:
  caddy:
    image: caddy:2-alpine
    container_name: airtrackmp_caddy
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Sobrescribe con .env, export en shell, o -e al hacer docker compose
      API_DOMAIN: ${API_DOMAIN:-airtrackmp.duckdns.org}
      ACME_EMAIL: ${ACME_EMAIL:-mirandakeiver213@gmail.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
